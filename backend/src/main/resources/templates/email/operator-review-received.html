<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Review Received</title>
  <style>
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
    .wrapper { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #f59e0b, #d97706); padding: 36px 32px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 26px; font-weight: 700; }
    .header p { color: rgba(255,255,255,0.9); margin: 6px 0 0; font-size: 14px; }
    .body { padding: 32px; color: #333; }
    .stars { font-size: 32px; text-align: center; margin: 16px 0 4px; }
    .rating-label { text-align: center; font-size: 14px; color: #888; margin-bottom: 20px; }
    .review-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 20px 24px; margin: 16px 0; }
    .review-row { font-size: 14px; color: #555; margin-bottom: 8px; }
    .review-row strong { color: #222; }
    .comment { font-style: italic; color: #444; border-left: 3px solid #f59e0b; padding-left: 12px; margin-top: 12px; font-size: 14px; }
    .btn { display: inline-block; background: #1a73e8; color: white; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; margin-top: 20px; }
    .footer { background: #f4f6f9; padding: 24px 32px; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #eee; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>🚌 TripGo</h1>
    <p>New Review Received</p>
  </div>
  <div class="body">
    <p>Hi <strong th:text="${operatorName}">Operator</strong>, a passenger has submitted a review for your bus.</p>
    <div class="stars">⭐</div>
    <p class="rating-label" th:text="${rating + ' / 5 stars'}">4 / 5 stars</p>
    <div class="review-box">
      <p class="review-row"><strong>Bus:</strong> <span th:text="${busName}">Bus</span></p>
      <p class="review-row"><strong>Route:</strong> <span th:text="${from + ' → ' + to}">A → B</span></p>
      <p class="review-row"><strong>Reviewer:</strong> <span th:text="${reviewerName}">John D.</span></p>
      <p class="review-row" th:if="${title != null and !#strings.isEmpty(title)}"><strong>Title:</strong> <span th:text="${title}">Great trip!</span></p>
      <p class="comment" th:if="${comment != null and !#strings.isEmpty(comment)}" th:text="${comment}">Great experience overall.</p>
    </div>
    <a th:href="${frontendUrl + '/operator/reviews'}" class="btn">View All Reviews</a>
  </div>
  <div class="footer">
    <p>© 2026 TripGo. All rights reserved.</p>
  </div>
</div>
</body>
</html>
