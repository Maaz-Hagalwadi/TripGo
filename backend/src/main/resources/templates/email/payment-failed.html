<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
<style>
  body{margin:0;padding:0;background:#f4f6f9;font-family:'Segoe UI',Arial,sans-serif;}
  .wrapper{max-width:600px;margin:30px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
  .header{background:linear-gradient(135deg,#e53e3e,#c53030);padding:36px 32px;text-align:center;}
  .header h1{color:#fff;margin:0;font-size:24px;font-weight:700;}
  .header p{color:rgba(255,255,255,0.85);margin:6px 0 0;font-size:14px;}
  .body{padding:32px;color:#333;}
  .info-box{background:#fff5f5;border:1px solid #fed7d7;border-radius:8px;padding:16px 20px;margin:20px 0;}
  .btn{display:inline-block;background:#1a73e8;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;margin-top:20px;}
  .footer{background:#f4f6f9;padding:20px 32px;text-align:center;font-size:12px;color:#999;border-top:1px solid #eee;}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>🚌 TripGo</h1>
    <p>Payment Failed</p>
  </div>
  <div class="body">
    <p>Hi <strong th:text="${firstName}">Traveller</strong>,</p>
    <p>Unfortunately your payment could not be processed for the following booking attempt:</p>
    <div class="info-box">
      <p style="margin:0 0 8px"><strong>Route:</strong> <span th:text="${from}">City A</span> → <span th:text="${to}">City B</span></p>
      <p style="margin:0 0 8px"><strong>Bus:</strong> <span th:text="${busName}">Bus Name</span></p>
      <p style="margin:0"><strong>Amount:</strong> ₹<span th:text="${amount}">0</span></p>
    </div>
    <p>Your seats have been released. Please try booking again.</p>
    <a th:href="${frontendUrl + '/search-results'}" class="btn">Try Again</a>
  </div>
  <div class="footer">© 2026 TripGo. Need help? Contact our support team.</div>
</div>
</body>
</html>
